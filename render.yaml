# Pour un dépôt Git dont la racine = ce dossier (ex. github.com/.../taskflow-backend).
# Ne pas utiliser rootDir ici.
services:
  - type: web
    name: taskflow-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
